<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Task Manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <p class="label">Synent Internship Task 5</p>
          <h1>Smart Task Manager</h1>
          <p id="todayDate"></p>
        </div>

        <button id="themeBtn" class="theme-btn">🌙</button>
      </header>

      <section class="task-form">
        <input type="text" id="taskInput" placeholder="Add a new task..." />

        <select id="priorityInput">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>

        <button id="addTaskBtn">Add</button>
      </section>

      <section class="controls">
        <input type="text" id="searchInput" placeholder="Search tasks..." />

        <div class="filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
      </section>

      <section class="stats">
        <p id="taskCounter">Total: 0 | Completed: 0 | Remaining: 0</p>

        <div class="progress-wrapper">
          <div id="progressBar"></div>
        </div>
      </section>

      <ul id="taskList"></ul>

      <p id="emptyMessage" class="empty-message">
        No tasks yet. Add your first task 🚀
      </p>

      <button id="deleteAllBtn" class="delete-all-btn">Delete All Tasks</button>
    </main>

    <script src="script.js"></script>
  </body>
</html>
